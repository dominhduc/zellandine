name: zellandine
version: "0.1.0"
description: "Sleep-inspired memory consolidation, skill evolution, and self-reflection for Hermes Agent. Dreams on recent sessions, stages proposed changes safely, wakes up smarter."
author: "Duc Do"
license: "MIT"
kind: standalone
provides_tools: []
# Zellandine integrates via a nightly script-only (no_agent) cron job that runs
# the dream cycle and delivers a digest — registered with `zellandine install-cron`.
# It intentionally registers no runtime hooks: consolidation is a scheduled,
# idle-time activity, not a per-session one.
hooks: []
